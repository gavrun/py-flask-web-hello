{% extends "base.html" %}

{% block title %}Edit Task - Task Manager Plus{% endblock %}

{% block page_title %}Edit task{% endblock %}

{% block content %}
    <section class="card">
        <form class="task-form vertical" action="{{ url_for('edit_task', task_id=task.id) }}" method="POST">
            <label for="title">Task title</label>
            <input
                id="title"
                type="text"
                name="title"
                value="{{ task.title }}"
                required
            >

            <label for="priority">Priority</label>
            <select id="priority" name="priority">
                {% for priority in priority_choices %}
                    <option value="{{ priority }}" {% if task.priority == priority %}selected{% endif %}>
                        {{ priority.title() }}
                    </option>
                {% endfor %}
            </select>

            <label class="checkbox-row">
                <input
                    type="checkbox"
                    name="completed"
                    {% if task.completed %}checked{% endif %}
                >
                Completed
            </label>

            <div class="form-actions">
                <button type="submit">Save Changes</button>
                <a class="button secondary" href="{{ url_for('task_detail', task_id=task.id) }}">
                    Cancel
                </a>
            </div>
        </form>
    </section>
{% endblock %}
